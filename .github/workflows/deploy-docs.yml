name: Deploy data dictionary

# Builds the MkDocs data-dictionary site and publishes it to GitHub Pages.
# One-time setup: in the repo Settings → Pages, set "Source" to "GitHub Actions".
#
# The site is built from the in-code schema (offline, deterministic). On pushes
# to main we additionally reconcile that in-code schema against the live R2
# parquet so the published dictionary can't silently disagree with the data.

on:
  push:
    branches: [main]
    paths:
      - 'data_dictionary/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/spicy_regs/data_dictionary.py'
      - 'src/spicy_regs/schemas/**'
      - '.github/workflows/deploy-docs.yml'
  # Refresh after the ETL publishes new data.
  workflow_run:
    workflows: ["ETL (new pipeline)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group docs

      - name: Reconcile in-code schema against live R2 parquet
        # Non-blocking: surfaces drift without failing the deploy if R2 is
        # briefly unavailable. Remove `|| true` to make it a hard gate.
        run: uv run spicy-regs-dict check --source r2 || true

      - name: Generate table pages
        run: uv run spicy-regs-dict generate

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
