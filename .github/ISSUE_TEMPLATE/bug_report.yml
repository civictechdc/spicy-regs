name: Bug report
description: Something isn't working the way it should.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I run `uv run pytest`, …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands or steps so we can reproduce it locally.
      placeholder: |
        1. `git clone …`
        2. `uv sync`
        3. `uv run …`
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11 (WSL2)"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
